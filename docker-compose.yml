version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: prediman-db
    environment:
      POSTGRES_DB: prediman_crm
      POSTGRES_USER: prediman
      POSTGRES_PASSWORD: prediman123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
