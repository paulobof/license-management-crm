spring:
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  lifecycle:
    timeout-per-shutdown-phase: 30s
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  info:
    title: Prediman CRM API
    description: API para gestão de clientes, documentos, contratos e cobranças
    version: 1.0.0

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

mail:
  from: ${MAIL_FROM:alertas@prediman.com.br}

evolution:
  api:
    url: ${EVOLUTION_API_URL:}
    key: ${EVOLUTION_API_KEY:}
    instance: ${EVOLUTION_INSTANCE_NAME:}

google:
  drive:
    enabled: ${GOOGLE_DRIVE_ENABLED:false}
    credentials-path: ${GOOGLE_DRIVE_CREDENTIALS_PATH:}
    root-folder-id: ${GOOGLE_DRIVE_ROOT_FOLDER_ID:}
